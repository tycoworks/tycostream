version: '3.8'

services:
  tycostream:
    build: .
    ports:
      - "4000:4000"
    environment:
      - SOURCE_HOST=${SOURCE_HOST}
      - SOURCE_PORT=${SOURCE_PORT:-6875}
      - SOURCE_USER=${SOURCE_USER}
      - SOURCE_PASSWORD=${SOURCE_PASSWORD}
      - SOURCE_DB=${SOURCE_DB}
      - GRAPHQL_PORT=${GRAPHQL_PORT:-4000}
      - GRAPHQL_UI=${GRAPHQL_UI:-true}
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/graphql"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s