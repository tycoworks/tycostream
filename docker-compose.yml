version: '3.8'

services:
  tycostream:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/graphql"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s